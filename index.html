<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Apex Live Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --apex-red: #da292a;
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #f0f0f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 90vh;
        }
        h1 { color: var(--apex-red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; margin-top: 0; }
        .container {
            background-color: var(--panel-bg); padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 950px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; width: 100%;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        /* Debug Panel Styling */
        .debug-panel {
            background: #181818; border: 1px solid #333; padding: 10px; 
            border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #888;
            margin-top: 5px; display: flex; flex-direction: column; gap: 4px;
        }
        .debug-line { display: flex; justify-content: space-between; }
        .status-success { color: #4caf50; }
        .status-warn { color: #ff9800; }
        .status-fail { color: #f44336; }

        .roster-status { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; width: 100%; margin-top: 5px; }
        .player-badge { background: #252525; padding: 10px 14px; border-radius: 4px; border-left: 4px solid var(--p-color, #fff); font-size: 0.9em; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
        .chart-container {
            width: 100%; max-width: 950px; height: 600px;
            background-color: var(--panel-bg); padding: 20px; box-sizing: border-box;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .status-text { font-size: 1.1em; color: #ccc; margin: 0; display: flex; align-items: center; }
        .btn-group { display: flex; gap: 10px; }
        button {
            background-color: transparent; border: 1px solid #444; color: #aaa;
            font-size: 0.75em; padding: 8px 14px; cursor: pointer; border-radius: 4px;
            transition: 0.2s; text-transform: uppercase; font-weight: bold;
        }
        button:hover { border-color: var(--apex-red); color: white; }
        .live-indicator { display: inline-block; width: 8px; height: 8px; background-color: #ff9800; border-radius: 50%; margin-right: 8px; }
        .live-active { background-color: #4caf50; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <h1>Squad Live Monitor</h1>

    <div class="container">
        <div class="header-row">
            <div class="status-text"><span id="globalIndicator" class="live-indicator"></span> <span id="globalStatus">Initializing network check...</span></div>
            <div class="btn-group">
                <button type="button" id="forceCheckBtn" style="background: #2a2a2a; color:#fff;">Scan Now</button>
                <button type="button" id="clearData">Reset History</button>
            </div>
        </div>
        
        <div class="debug-panel">
            <div class="debug-line"><span>Pipeline Engine:</span> <span id="debugProxy">None</span></div>
            <div class="debug-line"><span>Last API Attempt:</span> <span id="debugTime">Never</span></div>
            <div class="debug-line"><span>Response Validation:</span> <span id="debugResult">-</span></div>
        </div>

        <div class="roster-status" id="rosterStatus"></div>
    </div>

    <div class="chart-container">
        <canvas id="eloChart"></canvas>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURE YOUR ACTIVE SQUAD HERE
        // ==========================================
        const SQUAD = [
            { uid: "2292013299", name: "You", platform: "PC", color: "#da292a" },       
            { uid: "1111111111", name: "Friend One", platform: "PC", color: "#3498db" }, 
            { uid: "2222222222", name: "Friend Two", platform: "PC", color: "#2ecc71" }, 
            { uid: "3333333333", name: "Friend Three", platform: "X1", color: "#f1c40f" } 
        ];

        const API_KEY = "7c4c9fa6a93906fa0d110967a57a8286";
        const rankBases = { "Rookie": 0, "Bronze": 1000, "Silver": 3000, "Gold": 5400, "Platinum": 8200, "Diamond": 11400, "Master": 15000, "Predator": 15000 };
        const ranksOrder = ["Rookie", "Bronze", "Silver", "Gold", "Platinum", "Diamond", "Master", "Predator"];

        let teamHistory = JSON.parse(localStorage.getItem('apexGroupHistoryV3')) || [];
        let eloChart;

        // Rotating Proxy List to automatically bypass rate-limits or blocks
        const PROXIES = [
            (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`
        ];
        let currentProxyIndex = 0;

        function getDisplayInfo(absRP) {
            if (!absRP || absRP < 0) absRP = 0;
            let currentRank = "Rookie";
            for (let i = ranksOrder.length - 1; i >= 0; i--) {
                if (absRP >= rankBases[ranksOrder[i]]) { currentRank = ranksOrder[i]; break; }
            }
            return { rank: currentRank, total: absRP };
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function fetchSquadStats() {
            const statusBox = document.getElementById('rosterStatus');
            const globalIndicator = document.getElementById('globalIndicator');
            const globalStatus = document.getElementById('globalStatus');
            
            // Diagnostic Targets
            const debugProxy = document.getElementById('debugProxy');
            const debugTime = document.getElementById('debugTime');
            const debugResult = document.getElementById('debugResult');

            globalIndicator.className = "live-indicator";
            globalStatus.innerText = "Querying live servers...";
            debugTime.innerText = new Date().toLocaleTimeString();

            let updatedScores = {};
            let matchValidationPassed = false;
            let loggedDetails = [];

            for (let member of SQUAD) {
                let successForUser = false;
                let attempts = 0;

                // Attempt to reach the player's data using proxy shifting
                while (!successForUser && attempts < PROXIES.length) {
                    try {
                        const targetUrl = `https://api.apexlegendsstatus.com/bridge?version=5&platform=${member.platform}&uid=${member.uid}&auth=${API_KEY}`;
                        const activeProxyConfig = PROXIES[(currentProxyIndex + attempts) % PROXIES.length];
                        
                        debugProxy.innerText = `Engine ${((currentProxyIndex + attempts) % PROXIES.length) + 1} / ${PROXIES.length}`;

                        const response = await fetch(activeProxyConfig(targetUrl));
                        if (!response.ok) throw new Error("Network HTTP rejected");

                        let rawData = await response.json();
                        // Handle unformatted text wrappers from engines like AllOrigins
                        if (rawData.contents) rawData = JSON.parse(rawData.contents);

                        if (rawData && rawData.global && rawData.global.rank) {
                            const score = parseInt(rawData.global.rank.rankScore);
                            updatedScores[member.uid] = !isNaN(score) ? score : 0;
                            successForUser = true;
                            matchValidationPassed = true;
                            loggedDetails.push(`${member.name}: ${score} RP`);
                        } else {
                            throw new Error("Empty body layout response");
                        }
                    } catch (e) {
                        attempts++;
                        console.warn(`Proxy shift triggered for user ${member.name}. Error:`, e.message);
                    }
                }

                if (!successForUser) {
                    const lastRecord = teamHistory[teamHistory.length - 1];
                    updatedScores[member.uid] = lastRecord && lastRecord.scores[member.uid] ? lastRecord.scores[member.uid] : 0;
                    loggedDetails.push(`${member.name}: Loaded from Cache`);
                }
                await delay(1200);
            }

            // Cycle base proxy pointer index to vary origin traffic on subsequent cycles
            currentProxyIndex = (currentProxyIndex + 1) % PROXIES.length;

            if (!matchValidationPassed) {
                debugResult.className = "status-fail";
                debugResult.innerText = "Blocked by API Firewall. Shifting server tunnels for next loop...";
                globalStatus.innerText = "Sync delayed. Check diagnostics below.";
                return;
            }

            debugResult.className = "status-success";
            debugResult.innerText = `Verified payload parsed successfully! (${loggedDetails.join(', ')})`;

            // Identify changes to build graph history lines
            let changeDetected = teamHistory.length === 0;
            if (!changeDetected) {
                const lastRecord = teamHistory[teamHistory.length - 1];
                for (let member of SQUAD) {
                    if (updatedScores[member.uid] !== lastRecord.scores[member.uid]) {
                        changeDetected = true;
                        break;
                    }
                }
            }

            if (changeDetected) {
                teamHistory.push({
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    scores: updatedScores
                });
                localStorage.setItem('apexGroupHistoryV3', JSON.stringify(teamHistory));
            }

            // Draw HTML elements
            statusBox.innerHTML = "";
            SQUAD.forEach(m => {
                const currentScore = updatedScores[m.uid] || 0;
                const info = getDisplayInfo(currentScore);
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                badge.style.setProperty('--p-color', m.color);
                badge.innerHTML = `<strong>${m.name}</strong>: ${info.rank} (${info.total} Total RP)`;
                statusBox.appendChild(badge);
            });

            globalIndicator.className = "live-indicator live-active";
            globalStatus.innerText = "Team Live Stream Connection Verified";
            renderGroupChart();
        }

        function renderGroupChart() {
            if (teamHistory.length === 0) return;
            const labels = teamHistory.map((t, i) => i === 0 ? "Start" : `${t.timestamp}`);
            const datasets = SQUAD.map(member => ({
                label: member.name,
                data: teamHistory.map(h => h.scores[member.uid] || 0),
                borderColor: member.color,
                backgroundColor: 'transparent',
                tension: 0.2,
                pointRadius: 5,
                borderWidth: 3
            }));

            let allPoints = [];
            teamHistory.forEach(h => {
                Object.values(h.scores).forEach(v => { if (v > 0) allPoints.push(v); });
            });

            const maxVal = Math.max(...allPoints, 2000);
            const minVal = Math.min(...allPoints, 0);

            if (eloChart) eloChart.destroy();

            eloChart = new Chart(document.getElementById('eloChart'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: Math.max(0, minVal - 300), max: maxVal + 300,
                            ticks: { color: '#aaa' }, grid: { color: '#252525' }
                        },
                        x: { ticks: { color: '#aaa' }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { labels: { color: '#fff' } },
                        tooltip: {
                            mode: 'index', intersect: false,
                            callbacks: {
                                label: (ctx) => ` ${ctx.dataset.label}: ${getDisplayInfo(ctx.raw).rank} (${ctx.raw} RP)`
                            }
                        }
                    }
                }
            });
        }

        // Loop Triggers
        fetchSquadStats();
        setInterval(fetchSquadStats, 60000);

        document.getElementById('forceCheckBtn').addEventListener('click', fetchSquadStats);
        document.getElementById('clearData').addEventListener('click', () => {
            if (confirm("Wipe cache?")) {
                localStorage.removeItem('apexGroupHistoryV3');
                teamHistory = [];
                fetchSquadStats();
            }
        });
    </script>
</body>
</html>
