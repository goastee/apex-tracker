<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Squad Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 10px; }
        .btn-container { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .charts-container { display: flex; width: 98vw; gap: 20px; flex-wrap: wrap; }
        .chart-wrapper { flex: 1 1 45%; min-height: 400px; background: #1a1a1a; padding: 15px; border-radius: 8px; position: relative; }
        
        @media (max-width: 900px) {
            .charts-container { flex-direction: column; }
            .chart-wrapper { flex: 1 1 100%; min-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Squad Live Performance</h1>
        <div class="btn-container">
            <button onclick="updateCharts()">Refresh Data</button>
            <button onclick="resetZoomAll()">Reset Zoom</button>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
        <div class="chart-wrapper"><canvas id="dailyChart"></canvas></div>
    </div>

    <script>
        let mainChart, dailyChart;
        const NAME_MAP = {"2292013299": "Luci", "1011944913282": "Saywhat", "1012860147038": "Talon", "1011877813719": "Anubis", "2433485727": "trevor", "1004525474326": "mamapunk"};
        const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];

        function getZoomOptions() {
            return {
                zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' },
                pan: { enabled: true, mode: 'xy' }
            };
        }

        async function updateCharts() {
            const res = await fetch('history.json?nocache=' + Date.now());
            const data = await res.json();
            const labels = data.map(d => d.timestamp);
            const uids = [...new Set(data.flatMap(d => Object.keys(d.scores)))];

            // Render Main Chart
            const datasets = uids.map((uid, i) => ({
                label: NAME_MAP[uid] || uid,
                data: data.map(d => d.scores[uid] || null),
                borderColor: COLORS[i % COLORS.length],
                spanGaps: true
            }));

            if (!mainChart) {
                mainChart = new Chart(document.getElementById('mainChart'), {
                    type: 'line', data: { labels, datasets },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: getZoomOptions() } }
                });
            } else {
                mainChart.data.labels = labels;
                mainChart.data.datasets = datasets;
                mainChart.update('none');
            }

            // Render Daily Chart
            const lastDate = labels[labels.length - 1].split(' ')[0];
            const dailyData = data.filter(d => d.timestamp.includes(lastDate));
            const dailyLabels = dailyData.map(d => d.timestamp.split(' ').pop());
            
            const dailyDatasets = uids.map((uid, i) => {
                const startScore = dailyData.find(d => d.scores[uid] !== undefined)?.scores[uid];
                return {
                    label: NAME_MAP[uid] || uid,
                    data: dailyData.map(d => d.scores[uid] !== undefined ? d.scores[uid] - startScore : null),
                    borderColor: COLORS[i % COLORS.length],
                    spanGaps: true
                };
            });

            if (!dailyChart) {
                dailyChart = new Chart(document.getElementById('dailyChart'), {
                    type: 'line', data: { labels: dailyLabels, datasets: dailyDatasets },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: getZoomOptions() } }
                });
            } else {
                dailyChart.data.labels = dailyLabels;
                dailyChart.data.datasets = dailyDatasets;
                dailyChart.update('none');
            }
        }

        function resetZoomAll() {
            if(mainChart) mainChart.resetZoom();
            if(dailyChart) dailyChart.resetZoom();
        }

        updateCharts();
        setInterval(updateCharts, 30000);
    </script>
</body>
</html>
