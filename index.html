<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Apex Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: #da292a; text-transform: uppercase; text-align: center; }
        .chart-container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            height: 500px;
        }
    </style>
</head>
<body>

    <h1>Squad Rank Monitor</h1>
    <div class="chart-container">
        <canvas id="eloChart"></canvas>
    </div>

    <script>
        async function loadTracker() {
            try {
                // Fetch the central history data file from your repository
                const response = await fetch('./history.json');
                const historyData = await response.json();

                // 1. Pull out the timestamps for the bottom axis
                const labels = historyData.map(entry => entry.time);

                // 2. Identify the players automatically from the first entry keys
                const playerNames = Object.keys(historyData[0]).filter(key => key !== 'time');
                
                const colors = ["#da292a", "#3498db", "#2ecc71", "#f1c40f"];

                // 3. Formulate the line lines for Chart.js
                const datasets = playerNames.map((name, index) => ({
                    label: name,
                    data: historyData.map(entry => entry[name]),
                    borderColor: colors[index % colors.length],
                    backgroundColor: 'transparent',
                    tension: 0.2,
                    borderWidth: 3
                }));

                // 4. Render the Graph
                new Chart(document.getElementById('eloChart'), {
                    type: 'line',
                    data: { labels: labels, datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { grid: { color: '#252525' }, ticks: { color: '#aaa' } },
                            x: { grid: { display: false }, ticks: { color: '#aaa' } }
                        },
                        plugins: {
                            legend: { labels: { color: '#fff' } }
                        }
                    }
                });
            } catch (err) {
                console.error("Data file history.json missing or malformed.", err);
            }
        }
        loadTracker();
    </script>
</body>
</html>
