<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Apex Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    
    <style>
        body { 
            background: #121212; color: white; font-family: sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; 
            align-items: center; 
            min-height: 100vh; min-height: 100dvh; 
            box-sizing: border-box;
        }
        
        .header { text-align: center; margin-bottom: 5px; flex-shrink: 0; }
        .header h1 { margin: 5px 0 10px 0; }
        
        /* --- STATS BLURB --- */
        .stats-blurb {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; 
            background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; 
            width: 100%; max-width: 1000px; margin-left: auto; margin-right: auto;
        }
        .stat-item {
            text-align: center; background: #222; padding: 10px; border-radius: 5px; flex: 1 1 130px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #3498db; margin-top: 5px; }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: bold; }
        
        .btn-container { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-shrink: 0; flex-wrap: wrap; }
        
        button { 
            background: #3498db; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background: #2980b9; }

        select {
            background: #333; color: white; border: none; 
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 1rem; outline: none;
        }
        select:hover { background: #444; }

        /* --- TAB SYSTEM --- */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #1a1a1a; padding: 5px; border-radius: 8px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: transparent; color: #aaa; }
        .tab-btn.active { background: #2ecc71; color: white; }
        .tab-btn:hover:not(.active) { background: #333; }
        
        .tab-content { display: none; width: 100%; flex: 1; flex-direction: column; }
        .tab-content.active { display: flex; }
        
        /* --- GRAPHS --- */
        .charts-container { 
            display: flex; width: 100%; gap: 20px; flex-wrap: wrap; 
            padding: 0 10px; box-sizing: border-box; flex: 1; 
        }
        .chart-wrapper { 
            flex: 1 1 600px; background: #1a1a1a; 
            padding: 15px; border-radius: 8px; position: relative; 
            min-height: 500px; width: 100%;
        }

        /* --- SYNERGY PANEL --- */
        .synergy-container {
            width: 100%; max-width: 800px; margin: 0 auto;
            background: #1a1a1a; border-radius: 8px; padding: 20px; box-sizing: border-box;
        }
        .synergy-table { width: 100%; border-collapse: collapse; text-align: left; }
        .synergy-table th, .synergy-table td { padding: 12px; border-bottom: 1px solid #333; }
        .synergy-table th { color: #888; font-size: 0.9rem; text-transform: uppercase; }
        .synergy-table tr:hover { background: #222; }
        .positive { color: #2ecc71; font-weight: bold; }
        .negative { color: #e74c3c; font-weight: bold; }
        .trio-tag { color: #f1c40f; font-size: 0.75rem; margin-left: 5px; vertical-align: middle; }
        .duo-tag { color: #bdc3c7; font-size: 0.75rem; margin-left: 5px; vertical-align: middle; }
        
        @media (max-width: 900px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.2rem; margin-bottom: 5px; } 
            .stats-blurb { gap: 5px; padding: 10px; margin-bottom: 10px; }
            .stat-item { padding: 8px; flex: 1 1 45%; }
            .stat-value { font-size: 1rem; }
            .btn-container { margin-bottom: 10px; gap: 5px; } 
            button, select { padding: 6px 12px; font-size: 0.85rem; } 
            .tabs { margin-bottom: 10px; }
            .charts-container { flex-direction: column; gap: 10px; padding: 0; }
            .chart-wrapper { flex: 1; min-height: 0; padding: 10px; } 
            .synergy-table th, .synergy-table td { padding: 8px 4px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VIP Apex Tracker</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('graphs')">Live Graphs</button>
        <button class="tab-btn" onclick="switchTab('singlePlayer')">Player Focus</button>
        <button class="tab-btn" onclick="switchTab('synergy')">Best Matchups</button>
    </div>

    <div id="graphs" class="tab-content active">
        <div class="btn-container">
            <button onclick="updateData()">Refresh Data</button>
            <button onclick="resetZoomAll()">Reset Zoom</button>
        </div>
        <div class="charts-container">
            <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
            <div class="chart-wrapper"><canvas id="dailyChart"></canvas></div>
        </div>
    </div>

    <div id="singlePlayer" class="tab-content">
        <div class="stats-blurb">
            <div class="stat-item">
                <div class="stat-label">Matches</div>
                <div class="stat-value" id="stat-matches">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Avg Games / Session</div>
                <div class="stat-value" id="stat-avg-games">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Avg RP / Session</div>
                <div class="stat-value" id="stat-avg-rp">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Plays Best With</div>
                <div class="stat-value" id="stat-best-team" style="font-size: 0.9rem;">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Plays Worst With</div>
                <div class="stat-value" id="stat-worst-team" style="font-size: 0.9rem;">-</div>
            </div>
        </div>

        <div class="btn-container">
            <select id="playerSelect" onchange="updateData()">
                </select>
            <button onclick="updateData()">Refresh Data</button>
            <button onclick="resetZoomAll()">Reset Zoom</button>
        </div>
        <div class="charts-container">
            <div class="chart-wrapper"><canvas id="singleChart"></canvas></div>
        </div>
    </div>

    <div id="synergy" class="tab-content">
        <div class="btn-container">
            <button onclick="updateData()">Refresh Data</button>
        </div>
        <div class="synergy-container">
            <table class="synergy-table">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>Matches</th>
                        <th>Net RP</th>
                        <th>Avg RP/Match</th>
                    </tr>
                </thead>
                <tbody id="synergy-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let mainChart, dailyChart, singleChart;
        const NAME_MAP = {
            "2292013299": "Luci", "1011944913282": "Saywhat", "1012860147038": "Talon",
            "1011877813719": "Anubis", "2433485727": "trevor", "1004525474326": "mamapunk",
            "76561198322670382": "Stunning", "1007818122992": "Zilch","1000712994147": "Acquah", "1007823821914": "Ryu"
        };
        const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];

        // Stable per-player colors (keyed by UID) so every player keeps a unique, consistent line color
        // regardless of the order they appear in the data. Falls back to the palette for any unlisted UID.
        const PLAYER_COLORS = {
            "2292013299": "#e74c3c",    // Luci     - red
            "1011944913282": "#3498db", // Saywhat  - blue
            "1012860147038": "#2ecc71", // Talon    - green
            "1011877813719": "#f1c40f", // Anubis   - yellow
            "2433485727": "#9b59b6",    // trevor   - purple
            "1004525474326": "#e67e22", // mamapunk - orange
            "76561198322670382": "#1abc9c", // Stunning - turquoise
            "1007818122992": "#e84393", // Zilch    - magenta
            "1000712994147": "#00FFFF", // Acquah    - magenta
            "1007823821914": "#a29bfe"  // Ryu      - periwinkle
        };
        const getColor = (uid, i) => PLAYER_COLORS[uid] || COLORS[i % COLORS.length];

        // Treat a rankScore of 0 as "no data": 0 means unranked (a ranked-split reset or no placement),
        // not real RP, so it must not draw a line or count as recent activity. Returns the score, or null.
        const getScore = (d, uid) => {
            const s = d.scores[uid];
            return (s === undefined || s === 0) ? null : s;
        };

        // Show a point marker only where the value changes (i.e. the first and last of any flat run),
        // and hide the interior points of a flat run so long unchanged stretches aren't buried in dots.
        // The full data array is kept, so the line itself is drawn continuously.
        function pointRadii(arr, radius = 3) {
            return arr.map((v, i) => {
                if (v === null || v === undefined) return 0;
                const prev = arr[i - 1];
                const next = arr[i + 1];
                const sameAsPrev = (prev !== null && prev !== undefined && prev === v);
                const sameAsNext = (next !== null && next !== undefined && next === v);
                return (sameAsPrev && sameAsNext) ? 0 : radius; // interior of flat run -> hidden
            });
        }

        // --- INACTIVITY AUTO-HIDE ---
        // A player whose RP hasn't changed within this many days (measured from the latest data point)
        // starts toggled OFF on the main chart, to keep it clean. Click the legend to show them again.
        // This mirrors the daily chart's "only show players who moved" behavior, over a longer window.
        const INACTIVE_DAYS = 21; // ~3 weeks; tweak to taste (14 = 2 weeks, 28 = 4 weeks)

        // Parse a "MM/DD HH:MM" timestamp into a Date. The data carries no year, so we infer it:
        // anything that would land after the reference (latest) date is rolled back a year, which
        // correctly handles a single Dec->Jan wrap in the history.
        function parseTs(ts, refDate) {
            const [datePart, timePart = '0:0'] = String(ts).split(' ');
            const [mo, da] = datePart.split('/').map(Number);
            const [hh, mi] = timePart.split(':').map(Number);
            if (!mo || !da) return new Date(2000, 0, 1); // date-less legacy timestamp (old time-only format) -> treat as very old
            let d = new Date(2000, mo - 1, da, hh || 0, mi || 0);
            if (refDate && d.getTime() > refDate.getTime() + 60000) d = new Date(1999, mo - 1, da, hh || 0, mi || 0);
            return d;
        }

        // Days since a player's most recent RP change (Infinity if they never appear in the data).
        function daysIdle(data, uid, refDate) {
            let lastTs = null, prev;
            for (const d of data) {
                const s = getScore(d, uid);
                if (s !== null) {
                    if (prev === undefined || s !== prev) lastTs = d.timestamp;
                    prev = s;
                }
            }
            return lastTs ? (refDate - parseTs(lastTs, refDate)) / 86400000 : Infinity;
        }

        // --- UI LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            window.dispatchEvent(new Event('resize'));
        }

        // --- ANNOTATION SETUP ---
        const RANK_THRESHOLDS = {
            "Bronze": { rp: 1000, color: '#cd7f32' }, "Silver": { rp: 3000, color: '#bdc3c7' },
            "Gold": { rp: 5400, color: '#f1c40f' }, "Platinum": { rp: 8200, color: '#1abc9c' },
            "Diamond": { rp: 11400, color: '#3498db' }, "Master": { rp: 15000, color: '#9b59b6' }
        };
        const rankAnnotations = {};
        Object.keys(RANK_THRESHOLDS).forEach(rank => {
            rankAnnotations[rank] = {
                type: 'line', yMin: RANK_THRESHOLDS[rank].rp, yMax: RANK_THRESHOLDS[rank].rp,
                borderColor: RANK_THRESHOLDS[rank].color, borderWidth: 1, borderDash: [5, 5], 
                label: { display: true, content: rank, position: 'start', backgroundColor: 'rgba(18, 18, 18, 0.8)', color: RANK_THRESHOLDS[rank].color, font: { size: 12, weight: 'bold' } }
            };
        });
        const zeroLineAnnotation = {
            zero: {
                type: 'line', yMin: 0, yMax: 0, borderColor: 'rgba(255, 255, 255, 0.5)', borderWidth: 2,
                label: { display: true, content: 'BREAK EVEN (0)', position: 'end', backgroundColor: 'rgba(18, 18, 18, 0.8)', color: '#fff', font: { size: 10 } }
            }
        };

        function getZoomOptions() { return { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' }, pan: { enabled: true, mode: 'xy' } }; }

        // --- PLAYER SPECIFIC STATS ENGINE ---
        function updateSinglePlayerStats(singleFilteredData, selectedUID, sortedGroups) {
            if (!singleFilteredData || singleFilteredData.length === 0 || !selectedUID) return;

            // 1. Matches & Sessions
            const totalMatches = singleFilteredData.length;
            const sessions = {};
            singleFilteredData.forEach(d => {
                const date = d.timestamp.split(' ')[0];
                if (!sessions[date]) sessions[date] = [];
                sessions[date].push(d.scores[selectedUID]);
            });
            const numSessions = Object.keys(sessions).length;
            const avgGames = numSessions > 0 ? (totalMatches / numSessions).toFixed(1) : 0;

            // 2. Avg RP Per Session
            let totalRPChange = 0;
            Object.values(sessions).forEach(dayScores => {
                if (dayScores.length > 0) {
                    const firstScore = dayScores[0];
                    const lastScore = dayScores[dayScores.length - 1];
                    totalRPChange += (lastScore - firstScore);
                }
            });
            const avgRP = numSessions > 0 ? Math.round(totalRPChange / numSessions) : 0;
            const rpSign = avgRP > 0 ? '+' : '';
            const rpClass = avgRP >= 0 ? 'positive' : 'negative';

            // 3. Best / Worst Team for this specific player
            let bestText = "N/A", worstText = "N/A";
            
            const playerGroups = sortedGroups.filter(g => g.uids.includes(selectedUID) && g.matches >= 2);
            
            if (playerGroups.length > 0) {
                const byAvg = [...playerGroups].sort((a, b) => (b.netRP / b.matches) - (a.netRP / a.matches));
                
                const formatTeammates = (group) => {
                    return group.uids
                        .filter(uid => uid !== selectedUID)
                        .map(uid => NAME_MAP[uid] || uid)
                        .join(' & ');
                };

                const best = byAvg[0];
                const bestNames = formatTeammates(best) || 'Solo';
                const bestAvg = (best.netRP / best.matches).toFixed(1);
                bestText = `<span style="color: #2ecc71;">${bestNames} (+${bestAvg})</span>`;
                
                const worst = byAvg[byAvg.length - 1];
                const worstNames = formatTeammates(worst) || 'Solo';
                const worstAvg = (worst.netRP / worst.matches).toFixed(1);
                const wSign = worstAvg > 0 ? '+' : '';
                worstText = `<span style="color: #e74c3c;">${worstNames} (${wSign}${worstAvg})</span>`;
            }

            document.getElementById('stat-matches').innerText = totalMatches;
            document.getElementById('stat-avg-games').innerText = avgGames;
            document.getElementById('stat-avg-rp').innerHTML = `<span class="${rpClass}">${rpSign}${avgRP}</span>`;
            document.getElementById('stat-best-team').innerHTML = bestText;
            document.getElementById('stat-worst-team').innerHTML = worstText;
        }

        // --- SYNERGY CALCULATOR ---
        function processSynergy(data) {
            const lastKnown = {};
            const groups = {};

            data.forEach(entry => {
                const scores = entry.scores;
                const currentUIDs = Object.keys(scores);
                const deltas = {};

                currentUIDs.forEach(uid => {
                    if (lastKnown[uid] !== undefined) deltas[uid] = scores[uid] - lastKnown[uid];
                    lastKnown[uid] = scores[uid];
                });

                const activeUIDs = currentUIDs.filter(uid => deltas[uid] !== undefined && deltas[uid] !== 0);
                const currentTrios = [];

                for (let i = 0; i < activeUIDs.length - 2; i++) {
                    for (let j = i + 1; j < activeUIDs.length - 1; j++) {
                        for (let k = j + 1; k < activeUIDs.length; k++) {
                            const uid1 = activeUIDs[i], uid2 = activeUIDs[j], uid3 = activeUIDs[k];
                            const trioKey = [uid1, uid2, uid3].sort().join('|');
                            currentTrios.push([uid1, uid2, uid3]);
                            
                            if (!groups[trioKey]) groups[trioKey] = { uids: [uid1, uid2, uid3], type: 'Trio', matches: 0, netRP: 0 };
                            groups[trioKey].matches += 1;
                            groups[trioKey].netRP += (deltas[uid1] + deltas[uid2] + deltas[uid3]) / 3;
                        }
                    }
                }

                for (let i = 0; i < activeUIDs.length - 1; i++) {
                    for (let j = i + 1; j < activeUIDs.length; j++) {
                        const uid1 = activeUIDs[i], uid2 = activeUIDs[j];
                        let isPartOfTrio = false;
                        for (const trio of currentTrios) {
                            if (trio.includes(uid1) && trio.includes(uid2)) { isPartOfTrio = true; break; }
                        }
                        if (!isPartOfTrio) {
                            const duoKey = [uid1, uid2].sort().join('|');
                            if (!groups[duoKey]) groups[duoKey] = { uids: [uid1, uid2], type: 'Duo', matches: 0, netRP: 0 };
                            groups[duoKey].matches += 1;
                            groups[duoKey].netRP += (deltas[uid1] + deltas[uid2]) / 2;
                        }
                    }
                }
            });

            const sortedGroups = Object.values(groups).sort((a, b) => b.netRP - a.netRP);
            const tbody = document.getElementById('synergy-body');
            tbody.innerHTML = '';
            
            sortedGroups.forEach(group => {
                if (group.matches < 2) return; 
                const teamNames = group.uids.map(uid => `<strong>${NAME_MAP[uid] || uid}</strong>`).join(' & ');
                const avg = (group.netRP / group.matches).toFixed(1);
                const netClass = group.netRP >= 0 ? 'positive' : 'negative';
                const sign = group.netRP > 0 ? '+' : '';
                const tag = group.type === 'Trio' ? '<span class="trio-tag">(TRIO)</span>' : '<span class="duo-tag">(DUO)</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${teamNames} ${tag}</td>
                        <td>${group.matches}</td>
                        <td class="${netClass}">${sign}${Math.round(group.netRP)}</td>
                        <td class="${netClass}">${sign}${avg}</td>
                    </tr>
                `;
            });

            return sortedGroups; 
        }

        function populateDropdown(uids) {
            const select = document.getElementById('playerSelect');
            if (select.options.length === 0) {
                uids.forEach(uid => {
                    let opt = document.createElement('option');
                    opt.value = uid;
                    opt.textContent = NAME_MAP[uid] || uid;
                    select.appendChild(opt);
                });
            }
        }

        async function updateData() {
            try {
                const res = await fetch('history.json?nocache=' + Date.now());
                const data = await res.json();
                if (!data || data.length === 0) return;

                const sortedGroups = processSynergy(data);

                const labels = data.map(d => d.timestamp);
                const uids = [...new Set(data.flatMap(d => Object.keys(d.scores)))];
                populateDropdown(uids);

                // --- TAB 1: MAIN CHARTS ---
                const allScores = data.flatMap(d => Object.values(d.scores)).filter(v => v !== 0);
                const minRP = allScores.length ? Math.max(0, Math.min(...allScores) - 200) : 0;
                const maxRP = allScores.length ? Math.max(...allScores) + 200 : 20000;

                const refDate = parseTs(labels[labels.length - 1]);
                const datasets = uids.map((uid, i) => {
                    const arr = data.map(d => getScore(d, uid));
                    return {
                        label: NAME_MAP[uid] || uid,
                        data: arr,
                        borderColor: getColor(uid, i),
                        pointRadius: pointRadii(arr),
                        hidden: daysIdle(data, uid, refDate) > INACTIVE_DAYS, // auto-hide inactive players
                        spanGaps: true
                    };
                });

                if (!mainChart) {
                    mainChart = new Chart(document.getElementById('mainChart'), {
                        type: 'line', data: { labels, datasets },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: getZoomOptions(), annotation: { annotations: rankAnnotations } }, scales: { y: { suggestedMin: minRP, suggestedMax: maxRP, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } } }
                    });
                } else {
                    mainChart.data.labels = labels;
                    datasets.forEach((newDs, i) => { if (mainChart.data.datasets[i]) newDs.hidden = !mainChart.isDatasetVisible(i); });
                    mainChart.data.datasets = datasets;
                    mainChart.options.scales.y.suggestedMin = minRP;
                    mainChart.options.scales.y.suggestedMax = maxRP;
                    mainChart.update('none');
                }

                // --- TAB 1: DAILY CHART ---
                const lastDate = labels[labels.length - 1].split(' ')[0];
                const dailyData = data.filter(d => d.timestamp.includes(lastDate));
                const dailyLabels = dailyData.map(d => d.timestamp.split(' ').pop());
                const dailyDatasets = [];
                
                uids.forEach((uid, i) => {
                    const startEntry = dailyData.find(d => getScore(d, uid) !== null);
                    if (startEntry) {
                        const startScore = getScore(startEntry, uid);
                        let scoreMoved = false;
                        const dData = dailyData.map(d => {
                            const s = getScore(d, uid);
                            if (s !== null) {
                                if (s !== startScore) scoreMoved = true;
                                return s - startScore;
                            }
                            return null;
                        });
                        dailyDatasets.push({ label: NAME_MAP[uid] || uid, data: dData, borderColor: getColor(uid, i), pointRadius: pointRadii(dData), spanGaps: true, hidden: !scoreMoved });
                    }
                });

                if (!dailyChart) {
                    dailyChart = new Chart(document.getElementById('dailyChart'), {
                        type: 'line', data: { labels: dailyLabels, datasets: dailyDatasets },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: getZoomOptions(), annotation: { annotations: zeroLineAnnotation } }, scales: { y: { suggestedMin: -100, suggestedMax: 100, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } } }
                    });
                } else {
                    dailyChart.data.labels = dailyLabels;
                    dailyDatasets.forEach((newDs, i) => { if (dailyChart.data.datasets[i]) newDs.hidden = !dailyChart.isDatasetVisible(i); });
                    dailyChart.data.datasets = dailyDatasets;
                    dailyChart.update('none');
                }

                // --- TAB 2: SINGLE PLAYER CHART (DEDUPLICATED) ---
                const selectedUID = document.getElementById('playerSelect').value;
                if (selectedUID) {
                    const singleFilteredData = [];
                    let prevScore = null;
                    data.forEach(d => {
                        const currentScore = getScore(d, selectedUID);
                        if (currentScore !== null) {
                            if (prevScore === null || currentScore !== prevScore) {
                                singleFilteredData.push(d);
                                prevScore = currentScore;
                            }
                        }
                    });

                    updateSinglePlayerStats(singleFilteredData, selectedUID, sortedGroups);

                    const singleLabels = singleFilteredData.map(d => d.timestamp);
                    const singleDataPoints = singleFilteredData.map(d => getScore(d, selectedUID));
                    const playerIndex = uids.indexOf(selectedUID);
                    const playerColor = getColor(selectedUID, playerIndex >= 0 ? playerIndex : 0);
                    const singleMinRP = singleDataPoints.length ? Math.max(0, Math.min(...singleDataPoints) - 100) : 0;
                    const singleMaxRP = singleDataPoints.length ? Math.max(...singleDataPoints) + 100 : 20000;

                    if (!singleChart) {
                        singleChart = new Chart(document.getElementById('singleChart'), {
                            type: 'line', data: { labels: singleLabels, datasets: [{ label: NAME_MAP[selectedUID] || selectedUID, data: singleDataPoints, borderColor: playerColor, borderWidth: 3, spanGaps: true }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: getZoomOptions(), annotation: { annotations: rankAnnotations } }, scales: { y: { suggestedMin: singleMinRP, suggestedMax: singleMaxRP, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } } }
                        });
                    } else {
                        singleChart.data.labels = singleLabels;
                        singleChart.data.datasets[0].label = NAME_MAP[selectedUID] || selectedUID;
                        singleChart.data.datasets[0].data = singleDataPoints;
                        singleChart.data.datasets[0].borderColor = playerColor;
                        singleChart.options.scales.y.suggestedMin = singleMinRP;
                        singleChart.options.scales.y.suggestedMax = singleMaxRP;
                        singleChart.update('none');
                    }
                }
            } catch (error) { console.error("Error fetching or rendering data:", error); }
        }

        function resetZoomAll() {
            if(mainChart) mainChart.resetZoom();
            if(dailyChart) dailyChart.resetZoom();
            if(singleChart) singleChart.resetZoom();
        }

        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
