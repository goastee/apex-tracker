<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Squad Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .chart-container { width: 90vw; height: 70vh; margin-top: 20px; cursor: grab; }
        .chart-container:active { cursor: grabbing; }
    </style>
</head>
<body>
    <h1>Squad Live Performance</h1>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
    
    <script>
        const NAME_MAP = {
            "2292013299": "Luci",
            "1011944913282": "Saywhat",
            "1012860147038": "Talon"
        };

        async function render() {
            const res = await fetch('history.json?nocache=' + Date.now());
            const history = await res.json();
            
            // Collect all unique UIDs from every record
            const allUIDs = [...new Set(history.flatMap(h => Object.keys(h.scores)))];
            
            const datasets = allUIDs.map((uid, index) => ({
                label: NAME_MAP[uid] || `Player ${uid}`,
                data: history.map(h => h.scores[uid] || 0),
                borderColor: ['#da292a', '#3498db', '#2ecc71', '#f1c40f'][index % 4],
                tension: 0.2
            }));

            new Chart(document.getElementById('myChart'), {
                type: 'line',
                data: { labels: history.map(h => h.timestamp), datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        zoom: {
                            pan: { enabled: true, mode: 'xy' },
                            zoom: {
                                wheel: { enabled: true },
                                mode: 'xy',
                                onZoom: function({chart}) {
                                    const range = chart.scales.x.max - chart.scales.x.min;
                                    chart.options.plugins.zoom.zoom.mode = (range < 4) ? 'y' : 'xy';
                                }
                            }
                        }
                    },
                    scales: {
                        y: { min: 0, beginAtZero: true, ticks: { color: '#aaa' }, grid: { color: '#252525' } },
                        x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } }
                    }
                }
            });
        }
        render();
        setInterval(render, 60000); 
    </script>
</body>
</html>
