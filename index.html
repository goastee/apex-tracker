<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Apex Tracker</title>
    <!-- Core Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Hammer.js for panning -->
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <!-- Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <!-- Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    
    <style>
        body { 
            background: #121212; color: white; font-family: sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; 
            align-items: center; 
            min-height: 100vh; min-height: 100dvh; 
            box-sizing: border-box;
        }
        
        .header { text-align: center; margin-bottom: 5px; flex-shrink: 0; }
        .header h1 { margin: 5px 0 10px 0; }
        .btn-container { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-shrink: 0; flex-wrap: wrap; }
        
        button { 
            background: #3498db; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background: #2980b9; }

        /* Custom styling for the player dropdown */
        select {
            background: #333; color: white; border: none; 
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 1rem; outline: none;
        }
        select:hover { background: #444; }

        /* --- TAB SYSTEM --- */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #1a1a1a; padding: 5px; border-radius: 8px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: transparent; color: #aaa; }
        .tab-btn.active { background: #2ecc71; color: white; }
        .tab-btn:hover:not(.active) { background: #333; }
        
        .tab-content { display: none; width: 100%; flex: 1; flex-direction: column; }
        .tab-content.active { display: flex; }
        
        /* --- GRAPHS --- */
        .charts-container { 
            display: flex; width: 100%; gap: 20px; flex-wrap: wrap; 
            padding: 0 10px; box-sizing: border-box; flex: 1; 
        }
        .chart-wrapper { 
            flex: 1 1 600px; background: #1a1a1a; 
            padding: 15px; border-radius: 8px; position: relative; 
            min-height: 500px; 
        }

        /* --- SYNERGY PANEL --- */
        .synergy-container {
            width: 100%; max-width: 800px; margin: 0 auto;
            background: #1a1a1a; border-radius: 8px; padding: 20px;
            box-sizing: border-box;
        }
        .synergy-table { width: 100%; border-collapse: collapse; text-align: left; }
        .synergy-table th, .synergy-table td { padding: 12px; border-bottom: 1px solid #333; }
        .synergy-table th { color: #888; font-size: 0.9rem; text-transform: uppercase; }
        .synergy-table tr:hover { background: #222; }
        .positive { color: #2ecc71; font-weight: bold; }
        .negative { color: #e74c3c; font-weight: bold; }
        .trio-tag { color: #f1c40f; font-size: 0.75rem; margin-left: 5px; vertical-align: middle; }
        .duo-tag { color: #bdc3c7; font-size: 0.75rem; margin-left: 5px; vertical-align: middle; }
        
        @media (max-width: 900px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.2rem; margin-bottom: 5px; } 
            .btn-container { margin-bottom: 10px; gap: 5px; } 
            button, select { padding: 6px 12px; font-size: 0.85rem; } 
            .tabs { margin-bottom: 10px; }
            .charts-container { flex-direction: column; gap: 10px; padding: 0; }
            .chart-wrapper { flex: 1; width: 100%; min-height: 0; padding: 10px; } 
            .synergy-table th, .synergy-table td { padding: 8px 4px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VIP Apex Tracker</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('graphs')">Live Graphs</button>
            <button class="tab-btn" onclick="switchTab('singlePlayer')">Player Focus</button>
            <button class="tab-btn" onclick="switchTab('synergy')">Best Matchups</button>
        </div>
    </div>

    <!-- TAB 1: GRAPHS -->
    <div id="graphs" class="tab-content active">
        <div class="btn-container">
            <button onclick="updateData()">Refresh Data</button>
            <button onclick="resetZoomAll()">Reset Zoom</button>
        </div>
        <div class="charts-container">
            <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
            <div class="chart-wrapper"><canvas id="dailyChart"></canvas></div>
        </div>
    </div>

    <!-- TAB 2: SINGLE PLAYER FOCUS -->
    <div id="singlePlayer" class="tab-content">
        <div class="btn-container">
            <select id="playerSelect" onchange="updateData()">
                <!-- Auto-populated via JS -->
            </select>
            <button onclick="updateData()">Refresh Data</button>
            <button onclick="resetZoomAll()">Reset Zoom</button>
        </div>
        <div class="charts-container">
            <div class="chart-wrapper"><canvas id="singleChart"></canvas></div>
        </div>
    </div>

    <!-- TAB 3: SYNERGY -->
    <div id="synergy" class="tab-content">
        <div class="btn-container">
            <button onclick="updateData()">Refresh Data</button>
        </div>
        <div class="synergy-container">
            <table class="synergy-table">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>Matches</th>
                        <th>Net RP</th>
                        <th>Avg RP/Match</th>
                    </tr>
                </thead>
                <tbody id="synergy-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let mainChart, dailyChart, singleChart;
        const NAME_MAP = {
            "2292013299": "Luci", "1011944913282": "Saywhat", "1012860147038": "Talon", 
            "1011877813719": "Anubis", "2433485727": "trevor", "1004525474326": "mamapunk"
        };
        const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];

        // --- UI LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            // Trigger a resize to fix Chart.js canvas sizing bug when hidden
            window.dispatchEvent(new Event('resize'));
        }

        // --- ANNOTATION SETUP ---
        const RANK_THRESHOLDS = {
            "Bronze": { rp: 1000, color: '#cd7f32' }, "Silver": { rp: 3000, color: '#bdc3c7' },
            "Gold": { rp: 5400, color: '#f1c40f' }, "Platinum": { rp: 8200, color: '#1abc9c' },
            "Diamond": { rp: 11400, color: '#3498db' }, "Master": { rp: 15000, color: '#9b59b6' }
        };
        const rankAnnotations = {};
        Object.keys(RANK_THRESHOLDS).forEach(rank => {
            rankAnnotations[rank] = {
                type: 'line', yMin: RANK_THRESHOLDS[rank].rp, yMax: RANK_THRESHOLDS[rank].rp,
                borderColor: RANK_THRESHOLDS[rank].color, borderWidth: 1, borderDash: [5, 5], 
                label: { display: true, content: rank, position: 'start', backgroundColor: 'rgba(18, 18, 18, 0.8)', color: RANK_THRESHOLDS[rank].color, font: { size: 12, weight: 'bold' } }
            };
        });
        const zeroLineAnnotation = {
            zero: {
                type: 'line', yMin: 0, yMax: 0, borderColor: 'rgba(255, 255, 255, 0.5)', borderWidth: 2,
                label: { display: true, content: 'BREAK EVEN (0)', position: 'end', backgroundColor: 'rgba(18, 18, 18, 0.8)', color: '#fff', font: { size: 10 } }
            }
        };

        function getZoomOptions() {
            return { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' }, pan: { enabled: true, mode: 'xy' } };
        }

        // --- SYNERGY CALCULATOR ---
        function processSynergy(data) {
            const lastKnown = {};
            const groups = {};

            data.forEach(entry => {
                const scores = entry.scores;
                const currentUIDs = Object.keys(scores);
                const deltas = {};

                currentUIDs.forEach(uid => {
                    if (lastKnown[uid] !== undefined) {
                        deltas[uid] = scores[uid] - lastKnown[uid];
                    }
                    lastKnown[uid] = scores[uid];
                });

                const activeUIDs = currentUIDs.filter(uid => deltas[uid] !== undefined && deltas[uid] !== 0);

                const currentTrios = [];

                // 1. Generate and Register Trios
                for (let i = 0; i < activeUIDs.length - 2; i++) {
                    for (let j = i + 1; j < activeUIDs.length - 1; j++) {
                        for (let k = j + 1; k < activeUIDs.length; k++) {
                            const uid1 = activeUIDs[i];
                            const uid2 = activeUIDs[j];
                            const uid3 = activeUIDs[k];
                            
                            const trioKey = [uid1, uid2, uid3].sort().join('|');
                            currentTrios.push([uid1, uid2, uid3]);
                            
                            if (!groups[trioKey]) groups[trioKey] = { uids: [uid1, uid2, uid3], type: 'Trio', matches: 0, netRP: 0 };
                            groups[trioKey].matches += 1;
                            groups[trioKey].netRP += (deltas[uid1] + deltas[uid2] + deltas[uid3]) / 3;
                        }
                    }
                }

                // 2. Generate and Register Duos (ONLY if they aren't part of a Trio we just made)
                for (let i = 0; i < activeUIDs.length - 1; i++) {
                    for (let j = i + 1; j < activeUIDs.length; j++) {
                        const uid1 = activeUIDs[i];
                        const uid2 = activeUIDs[j];
                        
                        let isPartOfTrio = false;
                        for (const trio of currentTrios) {
                            if (trio.includes(uid1) && trio.includes(uid2)) {
                                isPartOfTrio = true;
                                break;
                            }
                        }

                        if (!isPartOfTrio) {
                            const duoKey = [uid1, uid2].sort().join('|');
                            if (!groups[duoKey]) groups[duoKey] = { uids: [uid1, uid2], type: 'Duo', matches: 0, netRP: 0 };
                            groups[duoKey].matches += 1;
                            groups[duoKey].netRP += (deltas[uid1] + deltas[uid2]) / 2;
                        }
                    }
                }
            });

            const sortedGroups = Object.values(groups).sort((a, b) => b.netRP - a.netRP);
            const tbody = document.getElementById('synergy-body');
            tbody.innerHTML = '';
            
            sortedGroups.forEach(group => {
                if (group.matches < 2) return; 

                const teamNames = group.uids.map(uid => `<strong>${NAME_MAP[uid] || uid}</strong>`).join(' & ');
                const avg = (group.netRP / group.matches).toFixed(1);
                const netClass = group.netRP >= 0 ? 'positive' : 'negative';
                const sign = group.netRP > 0 ? '+' : '';
                const tag = group.type === 'Trio' ? '<span class="trio-tag">(TRIO)</span>' : '<span class="duo-tag">(DUO)</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${teamNames} ${tag}</td>
                        <td>${group.matches}</td>
                        <td class="${netClass}">${sign}${Math.round(group.netRP)}</td>
                        <td class="${netClass}">${sign}${avg}</td>
                    </tr>
                `;
            });
        }

        // --- DROPDOWN POPULATOR ---
        function populateDropdown(uids) {
            const select = document.getElementById('playerSelect');
            if (select.options.length === 0) {
                uids.forEach(uid => {
                    let opt = document.createElement('option');
                    opt.value = uid;
                    opt.textContent = NAME_MAP[uid] || uid;
                    select.appendChild(opt);
                });
            }
        }

        // --- MAIN RENDERER ---
        async function updateData() {
            try {
                const res = await fetch('history.json?nocache=' + Date.now());
                const data = await res.json();
                if (!data || data.length === 0) return;

                processSynergy(data);

                const labels = data.map(d => d.timestamp);
                const uids = [...new Set(data.flatMap(d => Object.keys(d.scores)))];
                
                populateDropdown(uids);

                // --- TAB 1: MAIN CHARTS ---
                const allScores = data.flatMap(d => Object.values(d.scores));
                const minRP = allScores.length ? Math.max(0, Math.min(...allScores) - 200) : 0;
                const maxRP = allScores.length ? Math.max(...allScores) + 200 : 20000;

                const datasets = uids.map((uid, i) => ({
                    label: NAME_MAP[uid] || uid,
                    data: data.map(d => d.scores[uid] !== undefined ? d.scores[uid] : null),
                    borderColor: COLORS[i % COLORS.length],
                    spanGaps: true
                }));

                if (!mainChart) {
                    mainChart = new Chart(document.getElementById('mainChart'), {
                        type: 'line', data: { labels, datasets },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            plugins: { zoom: getZoomOptions(), annotation: { annotations: rankAnnotations } },
                            scales: { y: { suggestedMin: minRP, suggestedMax: maxRP, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } }
                        }
                    });
                } else {
                    mainChart.data.labels = labels;
                    datasets.forEach((newDs, i) => { if (mainChart.data.datasets[i]) newDs.hidden = !mainChart.isDatasetVisible(i); });
                    mainChart.data.datasets = datasets;
                    mainChart.options.scales.y.suggestedMin = minRP;
                    mainChart.options.scales.y.suggestedMax = maxRP;
                    mainChart.update('none');
                }

                // --- TAB 1: DAILY CHART ---
                const lastDate = labels[labels.length - 1].split(' ')[0];
                const dailyData = data.filter(d => d.timestamp.includes(lastDate));
                const dailyLabels = dailyData.map(d => d.timestamp.split(' ').pop());
                const dailyDatasets = [];
                
                uids.forEach((uid, i) => {
                    const startEntry = dailyData.find(d => d.scores[uid] !== undefined);
                    if (startEntry) {
                        const startScore = startEntry.scores[uid];
                        let scoreMoved = false;
                        const dData = dailyData.map(d => {
                            if (d.scores[uid] !== undefined) {
                                if (d.scores[uid] !== startScore) scoreMoved = true;
                                return d.scores[uid] - startScore;
                            }
                            return null;
                        });
                        dailyDatasets.push({
                            label: NAME_MAP[uid] || uid, data: dData,
                            borderColor: COLORS[i % COLORS.length], spanGaps: true, hidden: !scoreMoved 
                        });
                    }
                });

                if (!dailyChart) {
                    dailyChart = new Chart(document.getElementById('dailyChart'), {
                        type: 'line', data: { labels: dailyLabels, datasets: dailyDatasets },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            plugins: { zoom: getZoomOptions(), annotation: { annotations: zeroLineAnnotation } },
                            scales: { y: { suggestedMin: -100, suggestedMax: 100, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } }
                        }
                    });
                } else {
                    dailyChart.data.labels = dailyLabels;
                    dailyDatasets.forEach((newDs, i) => { if (dailyChart.data.datasets[i]) newDs.hidden = !dailyChart.isDatasetVisible(i); });
                    dailyChart.data.datasets = dailyDatasets;
                    dailyChart.update('none');
                }

                // --- TAB 2: SINGLE PLAYER CHART ---
                const selectedUID = document.getElementById('playerSelect').value;
                if (selectedUID) {
                    const singleFilteredData = data.filter(d => d.scores[selectedUID] !== undefined);
                    const singleLabels = singleFilteredData.map(d => d.timestamp);
                    const singleDataPoints = singleFilteredData.map(d => d.scores[selectedUID]);
                    
                    const playerIndex = uids.indexOf(selectedUID);
                    const playerColor = playerIndex >= 0 ? COLORS[playerIndex % COLORS.length] : '#3498db';

                    const singleMinRP = singleDataPoints.length ? Math.max(0, Math.min(...singleDataPoints) - 100) : 0;
                    const singleMaxRP = singleDataPoints.length ? Math.max(...singleDataPoints) + 100 : 20000;

                    if (!singleChart) {
                        singleChart = new Chart(document.getElementById('singleChart'), {
                            type: 'line', 
                            data: { 
                                labels: singleLabels, 
                                datasets: [{
                                    label: NAME_MAP[selectedUID] || selectedUID,
                                    data: singleDataPoints,
                                    borderColor: playerColor,
                                    borderWidth: 3, 
                                    spanGaps: true
                                }] 
                            },
                            options: { 
                                responsive: true, maintainAspectRatio: false, 
                                plugins: { zoom: getZoomOptions(), annotation: { annotations: rankAnnotations } },
                                scales: { y: { suggestedMin: singleMinRP, suggestedMax: singleMaxRP, ticks: { color: '#aaa' }, grid: { color: '#252525' } }, x: { ticks: { color: '#aaa' }, grid: { color: '#252525' } } }
                            }
                        });
                    } else {
                        singleChart.data.labels = singleLabels;
                        singleChart.data.datasets[0].label = NAME_MAP[selectedUID] || selectedUID;
                        singleChart.data.datasets[0].data = singleDataPoints;
                        singleChart.data.datasets[0].borderColor = playerColor;
                        singleChart.options.scales.y.suggestedMin = singleMinRP;
                        singleChart.options.scales.y.suggestedMax = singleMaxRP;
                        singleChart.update('none');
                    }
                }

            } catch (error) {
                console.error("Error fetching or rendering data:", error);
            }
        }

        function resetZoomAll() {
            if(mainChart) mainChart.resetZoom();
            if(dailyChart) dailyChart.resetZoom();
            if(singleChart) singleChart.resetZoom();
        }

        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
