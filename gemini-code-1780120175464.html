<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Apex Live Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --apex-red: #da292a;
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #f0f0f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 90vh;
        }
        h1 { color: var(--apex-red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; margin-top: 0; }
        .container {
            background-color: var(--panel-bg); padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 950px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; width: 100%;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .roster-status { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; width: 100%; margin-top: 5px; }
        .player-badge { background: #252525; padding: 8px 12px; border-radius: 4px; border-left: 4px solid var(--p-color, #fff); font-size: 0.9em; }
        .chart-container {
            width: 100%; max-width: 950px; height: 600px;
            background-color: var(--panel-bg); padding: 20px; box-sizing: border-box;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .status-text { font-size: 1.1em; color: #ccc; margin: 0; }
        button {
            background-color: transparent; border: 1px solid #444; color: #aaa;
            font-size: 0.75em; padding: 8px 14px; cursor: pointer; border-radius: 4px;
            transition: 0.2s; text-transform: uppercase; font-weight: bold;
        }
        button:hover { border-color: var(--apex-red); color: white; }
        .live-indicator { display: inline-block; width: 8px; height: 8px; background-color: #4caf50; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <h1>Squad Live Monitor</h1>

    <div class="container">
        <div class="header-row">
            <div class="status-text"><span class="live-indicator"></span> <strong>Live Team Stream</strong></div>
            <button type="button" id="clearData">Reset Team History</button>
        </div>
        <div class="roster-status" id="rosterStatus"></div>
    </div>

    <div class="chart-container">
        <canvas id="eloChart"></canvas>
    </div>

    <script>
        // ==========================================
        // 1. ADD SQUAD MEMBERS AND ASSIGN COLORS HERE
        // ==========================================
        const SQUAD = [
            { uid: "2292013299", name: "You", platform: "PC", color: "#da292a" },       // Apex Red
            { uid: "1111111111", name: "Friend One", platform: "PC", color: "#3498db" }, // Blue
            { uid: "2222222222", name: "Friend Two", platform: "PC", color: "#2ecc71" }, // Green
            { uid: "3333333333", name: "Friend Three", platform: "X1", color: "#f1c40f" } // Yellow
        ];

        const API_KEY = "7c4c9fa6a93906fa0d110967a57a8286";
        const thresholds = { "Rookie": 250, "Bronze": 500, "Silver": 600, "Gold": 700, "Platinum": 800, "Diamond": 900, "Master": 1000 };
        const ranksOrder = ["Rookie", "Bronze", "Silver", "Gold", "Platinum", "Diamond", "Master"];
        const rankBases = { "Rookie": 0, "Bronze": 1000, "Silver": 3000, "Gold": 5400, "Platinum": 8200, "Diamond": 11400, "Master": 15000 };

        // Consolidated structure: tracks absolute RP entries mapped to timeline ticks
        let teamHistory = JSON.parse(localStorage.getItem('apexGroupHistory')) || [];
        let eloChart;

        function getDisplayInfo(absRP) {
            let currentRank = "Rookie";
            for (let i = ranksOrder.length - 1; i >= 0; i--) {
                if (absRP >= rankBases[ranksOrder[i]]) { currentRank = ranksOrder[i]; break; }
            }
            let rpAboveRankBase = absRP - rankBases[currentRank];
            let currentThreshold = thresholds[currentRank] || 500;
            let divisionNum = 4 - Math.floor(rpAboveRankBase / currentThreshold);
            if (divisionNum < 1) divisionNum = 1;
            let rpInDiv = rpAboveRankBase % currentThreshold;
            return { rank: currentRank, division: divisionNum, rp: Math.floor(rpInDiv) };
        }

        // Delay utility to dodge concurrent server rate limits
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function fetchSquadStats() {
            const statusBox = document.getElementById('rosterStatus');
            let updatedScores = {};
            let changeDetected = false;

            // Fetch each member sequentially with a slight pause to avoid API spam blocks
            for (let member of SQUAD) {
                try {
                    const targetUrl = `https://api.apexlegendsstatus.com/bridge?version=5&platform=${member.platform}&uid=${member.uid}&auth=${API_KEY}`;
                    const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
                    const data = await response.json();

                    if (data.global && data.global.rank) {
                        updatedScores[member.uid] = data.global.rank.rankScore;
                    } else {
                        // Keep last known score if API fails temporarily
                        const lastRecord = teamHistory[teamHistory.length - 1];
                        updatedScores[member.uid] = lastRecord ? lastRecord.scores[member.uid] : 0;
                    }
                } catch (e) {
                    console.error(`Error fetching ${member.name}:`, e);
                    const lastRecord = teamHistory[teamHistory.length - 1];
                    updatedScores[member.uid] = lastRecord ? lastRecord.scores[member.uid] : 0;
                }
                await delay(1200); 
            }

            // Determine if anyone's rank score moved since the last poll tick
            if (teamHistory.length === 0) {
                changeDetected = true;
            } else {
                const lastRecord = teamHistory[teamHistory.length - 1];
                for (let member of SQUAD) {
                    if (updatedScores[member.uid] !== lastRecord.scores[member.uid]) {
                        changeDetected = true;
                        break;
                    }
                }
            }

            if (changeDetected) {
                teamHistory.push({
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    scores: updatedScores
                });
                localStorage.setItem('apexGroupHistory', JSON.stringify(teamHistory));
            }

            // Update user status interface layout cards
            statusBox.innerHTML = "";
            SQUAD.forEach(m => {
                const currentScore = updatedScores[m.uid] || 0;
                const info = getDisplayInfo(currentScore);
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                badge.style.setProperty('--p-color', m.color);
                badge.innerHTML = `<strong>${m.name}</strong>: ${info.rank} ${info.division} (${info.rp} RP)`;
                statusBox.appendChild(badge);
            });

            renderGroupChart();
        }

        function renderGroupChart() {
            if (teamHistory.length === 0) return;

            const labels = teamHistory.map((t, i) => i === 0 ? "Start" : `Tick ${i} (${t.timestamp})`);
            
            // Build unique tracking data configurations per squad player
            const datasets = SQUAD.map(member => {
                return {
                    label: member.name,
                    data: teamHistory.map(h => h.scores[member.uid] || null),
                    borderColor: member.color,
                    backgroundColor: 'transparent',
                    tension: 0.2,
                    pointRadius: 5,
                    borderWidth: 3
                };
            });

            // Gather all plot points across the group to calibrate boundaries
            let allPoints = [];
            teamHistory.forEach(h => {
                Object.values(h.scores).forEach(v => { if(v) allPoints.push(v); });
            });

            const maxVal = Math.max(...allPoints) || 1000;
            
            // Scaler logic: base viewport dynamic floor on the last 10 tracked dataset intervals
            const dynamicLookback = allPoints.slice(-10);
            const teamMovingAvg = dynamicLookback.reduce((a, b) => a + b, 0) / dynamicLookback.length;

            const yMax = maxVal + 150;
            const yMin = Math.max(0, teamMovingAvg - 400);

            if (eloChart) eloChart.destroy();

            eloChart = new Chart(document.getElementById('eloChart'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: yMin,
                            max: yMax,
                            ticks: { 
                                color: '#888', 
                                callback: function(v) { 
                                    const info = getDisplayInfo(v);
                                    return `${info.rank} (${info.rp})`; 
                                } 
                            },
                            grid: { color: '#252525' }
                        },
                        x: { ticks: { color: '#888' }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: true, labels: { color: '#fff' } },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const info = getDisplayInfo(ctx.raw);
                                    return ` ${ctx.dataset.label}: ${info.rank} ${info.division} (${info.rp} RP)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize background tasks
        fetchSquadStats();
        setInterval(fetchSquadStats, 45000); // Check every 45 seconds for changes

        document.getElementById('clearData').addEventListener('click', () => {
            if (confirm("Wipe team dashboard history? This resets graph plot timelines back to current values.")) {
                localStorage.removeItem('apexGroupHistory');
                teamHistory = [];
                fetchSquadStats();
            }
        });
    </script>
</body>
</html>
